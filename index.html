function verificarSenha() {
    const input = document.getElementById('senha-input').value;
    const erro = document.getElementById('erro-login');
    if (input === 'L1d3r3sRC2026') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        init();
    } else {
        erro.classList.remove('hidden');
        document.getElementById('senha-input').value = '';
        document.getElementById('senha-input').focus();
    }
}

function init() {
    renderSidebar();
    loadOverview();
}

function renderSidebar() {
    const nav = document.getElementById('skill-nav');
    skillsData.forEach(skill => {
        const btn = document.createElement('button');
        btn.className = 'w-full text-left px-4 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-white transition-colors flex items-center gap-3';
        btn.innerHTML = `<span class="text-lg">${skill.icon}</span><span class="truncate">${skill.name}</span>`;
        btn.onclick = () => { loadSkill(skill.id); closeSidebar(); };
        nav.appendChild(btn);
    });
}

function setActiveButton(id) {
    document.querySelectorAll('aside button').forEach(b => {
        b.classList.remove('bg-emerald-600', 'text-white', 'bg-slate-800');
        b.classList.add('text-slate-400');
    });
    if (id === 'overview') {
        const btn = document.getElementById('btn-overview');
        btn.classList.add('bg-emerald-600', 'text-white');
        btn.classList.remove('text-slate-400');
    } else {
        document.querySelectorAll('#skill-nav button').forEach(b => {
            if (b.onclick && b.onclick.toString().includes(`'${id}'`)) {
                b.classList.add('bg-slate-800', 'text-white');
                b.classList.remove('text-slate-400');
            }
        });
    }
}

function highlightRelatedSkills(processId, processName) {
    const container = document.getElementById('process-mapping-result');
    container.classList.remove('hidden');
    container.classList.add('fade-in');
    const linkedSkills = skillsData.filter(s => s.processesLinked.includes(processId));
    const skillsHtml = linkedSkills.length
        ? linkedSkills.map(s => `
            <div onclick="loadSkill('${s.id}')"
                class="bg-slate-800 p-4 rounded-lg hover:bg-slate-700 cursor-pointer transition-colors border border-slate-700 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <span class="text-xl">${s.icon}</span>
                    <div>
                        <span class="font-bold text-sm block">${s.name}</span>
                        <span class="text-xs text-slate-400">Clique para ver o plano de ensino</span>
                    </div>
                </div>
                <span class="text-xs text-emerald-400 font-bold">→</span>
            </div>`).join('')
        : `<p class="text-xs text-slate-400 italic">Acesse o menu lateral para conferir todos os planos de aprendizado.</p>`;
    container.innerHTML = `
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 pb-4 border-b border-slate-800 gap-2">
            <div>
                <span class="text-xs text-emerald-400 font-bold uppercase tracking-wider">Ações de Desenvolvimento</span>
                <h4 class="font-serif-title text-xl font-bold">${processName}</h4>
            </div>
            <button onclick="document.getElementById('process-mapping-result').classList.add('hidden')"
                class="text-xs text-slate-400 hover:text-white bg-slate-800 px-3 py-1 rounded">Fechar</button>
        </div>
        <p class="text-sm text-slate-300 mb-4">Para elevar a performance técnica deste pilar, desenvolva prioritariamente estas competências:</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">${skillsHtml}</div>`;
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderOverviewChart() {
    if (currentChart) currentChart.destroy();
    const ctx = document.getElementById('radarOverview').getContext('2d');
    currentChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: skillsData.map(s => s.name.length > 15 ? s.name.substr(0, 15) + '...' : s.name),
            datasets: [
                { label: 'Urgência Brasil', data: [9, 9.5, 9, 8, 9.5, 8.5, 9, 8, 7.5, 7], backgroundColor: 'rgba(16,185,129,0.2)', borderColor: 'rgba(16,185,129,1)', borderWidth: 2 },
                { label: 'Urgência EUA', data: [9.5, 9, 8.5, 8.5, 8, 9, 8.5, 9, 9, 7.5], backgroundColor: 'rgba(59,130,246,0.2)', borderColor: 'rgba(59,130,246,1)', borderWidth: 2 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { r: { angleLines: { display: true, color: '#e2e8f0' }, grid: { color: '#e2e8f0' }, ticks: { display: false }, pointLabels: { font: { size: window.innerWidth < 768 ? 8 : 9 }, color: '#475569' } } },
            plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
        }
    });
}

function renderSkillChart(br, us) {
    if (currentChart) currentChart.destroy();
    const ctx = document.getElementById('skillImpactChart').getContext('2d');
    currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Potencial de Retenção %'],
            datasets: [
                { label: 'Brasil', data: [br], backgroundColor: '#10b981', borderRadius: 6 },
                { label: 'EUA', data: [us], backgroundColor: '#3b82f6', borderRadius: 6 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false, indexAxis: 'y',
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' }, max: 50 },
                y: { ticks: { display: false } }
            },
            plugins: { legend: { position: 'top', labels: { color: '#f1f5f9', font: { size: 11 } } } }
        }
    });
}
