<!-- Sidebar Navigation --> <aside class="w-72 bg-stone-900 text-stone-300 flex flex-col h-full shadow-2xl z-10"> <div class="p-6 border-b border-stone-800"> <h1 class="font-serif-title text-2xl text-white tracking-tight mb-1">O Arquiteto</h1> <p class="text-xs text-stone-400 uppercase tracking-widest font-semibold">Construtor do Conhecimento</p> </div> <div class="p-4"> <p class="text-xs text-stone-500 mb-3 uppercase tracking-wider font-bold">Menu Principal</p> <button onclick="loadOverview()" id="btn-overview" class="w-full text-left px-4 py-3 rounded-lg mb-4 bg-blue-600 text-white font-medium transition-colors"> Visão Geral & Dados </button> <p class="text-xs text-stone-500 mb-2 uppercase tracking-wider font-bold">As 10 Habilidades (WEF)</p> </div> <nav class="flex-1 overflow-y-auto px-4 pb-6 space-y-1" id="skill-nav"> <!-- Populated by JS --> </nav> </aside> <!-- Main Content Area --> <main class="flex-1 h-full overflow-y-auto bg-stone-50 relative"> <div class="max-w-5xl mx-auto p-8 md:p-12 pb-24" id="main-content"> <!-- Content injected here --> </div> </main> <script> // --- DATA STRUCTURE --- const overviewData = {intro: `Olá! Sou O Arquiteto. O Construtor do Conhecimento. <br><br>
Para que uma liderança seja sólida, ela precisa primeiro <b>dar nome aos bois</b>. Não adianta falar de tendências se não soubermos exatamente o que cada habilidade significa no chão da fábrica ou na tela do computador. <br><br> Atualizei a pesquisa incluindo o <b>Conceito Central</b> de cada uma das 10 habilidades em alta até 2030. Explore os dados comparativos abaixo e mergulhe em cada habilidade na barra lateral para ver a definição técnica simplificada e meu método de ensino.`,
labels: [ 'IA & Big Data', 'Cibersegurança', 'Literacia Tech', 'Pensamento Criativo', 'Resiliência', 'Aprendizado Contínuo', 'Liderança', 'Gestão de Talentos', 'Pensamento Analítico', 'Gestão Ambiental' ], brScore: [7.5, 6.0, 7.0, 8.0, 9.5, 8.5, 8.0, 7.5, 7.0, 6.5], usScore: [9.5, 8.5, 9.0, 8.0, 8.0, 8.5, 8.5, 9.0, 9.0, 7.5]}; const skillsData = [ {id: 'ia', icon: '', name: 'IA e Big Data', concept: "É a capacidade de usar algoritmos e processamento massivo de dados para prever resultados, automatizar tarefas complexas e encontrar padrões que o olho humano jamais veria sozinho.", perfBR: 22, perfUS: 35, metaphor: "Imagine IA como um trator e sua equipe como agricultores. Você pode continuar cavando com as mãos (esforço máximo, resultado mínimo) ou aprender a dirigir o trator.", joke: "A IA não vai tirar seu emprego. Quem vai tirar seu emprego é o colega que sabe usar a IA e ainda sobra tempo pra tomar café enquanto você briga com a planilha.", explanation: "IA e Big Data não são sobre 'códigos', são sobre 'decisões'. O gestor de 2030 usa a máquina para limpar o ruído e focar no que importa. No Brasil, o foco é produtividade; nos EUA, o foco é personalização em escala.", pareto: ["Saber formular prompts estratégicos.", "Entender a ética e o viés dos dados."], blindspot: "Se a máquina decide tudo baseada no passado, como abrimos espaço para a inovação que o dado ainda não conhece?", related: "Pensamento Analítico"}, {id: 'ciber', icon: '', name: 'Redes e Cibersegurança', concept: "Conjunto de práticas e tecnologias que visam proteger a infraestrutura digital, dados e a privacidade contra ataques, invasões ou vazamentos.", perfBR: 15, perfUS: 28, metaphor: "Cibersegurança é como a tranca da porta da sua casa. Você pode ter a casa mais bonita do bairro (uma empresa lucrativa), mas se a tranca for frágil, tudo o que você construiu pode ser levado em uma noite.", joke: "A senha '123456' ainda é a mais usada no mundo. Se o seu time usa essa senha, você não precisa de um hacker, precisa de um milagre.", explanation: "Com o trabalho híbrido, a fronteira da empresa sumiu. Cada colaborador é agora um ponto de entrada para riscos. Gestores precisam treinar a 'higiene digital' da equipe tanto quanto treinam processos de venda.", pareto: ["Cultura de autenticação em dois fatores.", "Educação contra Phishing (o golpe do e-mail)."], blindspot: "O elo mais fraco da segurança nunca é o software, é o comportamento humano. Como educar sem ser o 'chato da TI'?", related: "Literacia Tecnológica"}, {id: 'tech', icon: '', name: 'Literacia Tecnológica', concept: "A habilidade de entender, avaliar e utilizar as ferramentas tecnológicas de forma fluida e crítica no dia a dia de trabalho.", perfBR: 25, perfUS: 20, metaphor: "É como saber ler e escrever no século XXI. Antigamente, quem não lia estava fora. Hoje, quem não 'lê' a tecnologia é um analfabeto funcional no mundo corporativo.", joke: "Literacia tecnológica não é saber postar Story no Instagram, é não precisar chamar o sobrinho toda vez que o Excel pede uma fórmula nova.", explanation: "Não basta ter a ferramenta, é preciso saber por que usá-la. No Brasil, a literacia tecnológica é o maior acelerador de inclusão produtiva. Times que aprendem a usar ferramentas de colaboração (Slack, Teams, Notion) reduzem o tempo de reunião em 40%.", pareto: ["Curadoria de ferramentas: use apenas o que resolve o problema.", "Mentalidade de 'Self-Service' tecnológico."], blindspot: "Estamos adotando ferramentas para facilitar o trabalho ou estamos trabalhando para alimentar as ferramentas?", related: "IA e Big Data"}, {id: 'criativo', icon: '', name: 'Pensamento Criativo', concept: "Capacidade de conectar ideias aparentemente desconectadas para gerar soluções originais e úteis para problemas novos ou antigos.", perfBR: 25, perfUS: 25, metaphor: "É como brincar de Lego. Todos têm as mesmas peças, mas o pensamento criativo é a habilidade de montar uma nave enquanto a concorrência monta um muro.", joke: "Criatividade no trabalho não é usar post-it colorido na parede; é resolver o pepino que o cliente jogou no seu colo sem estourar o orçamento.", explanation: "Enquanto a IA lida com o que 'já existe', o humano cria o que 'ainda não existe'. É a habilidade mais difícil de automatizar. Gestores devem incentivar o pensamento divergente (várias ideias) antes do convergente (uma solução).", pareto: ["Brainstorming reverso: como poderíamos piorar este problema? (para achar a solução).", "Exposição a referências fora do seu mercado."], blindspot: "Sua cultura permite o erro necessário para a criação, ou você só aceita a 'criatividade' que já vem com garantia de sucesso?", related: "Curiosidade e Aprendizado Contínuo"}, {id: 'resiliencia', icon: '', name: 'Resiliência, Flexibilidade e Agilidade', concept: "A tríade da adaptação: resistir à pressão sem quebrar (resiliência), ajustar-se a novos cenários (flexibilidade) e agir com velocidade e propósito (agilidade).", perfBR: 40, perfUS: 28, metaphor: "O bambu durante o furacão. Ele não tenta lutar contra o vento como o carvalho rígido; ele enverga, sobrevive e volta ao lugar quando a tempestade passa.", joke: "Planejamento estratégico é como plano de dieta: dura até a primeira caixa de chocolate (ou a primeira crise mundial) aparecer na sua frente.", explanation: "No Brasil, essa é a 'habilidade de sobrevivência'. O gestor precisa criar um ambiente onde a mudança não seja vista como ameaça, mas como a nova regra do jogo.", pareto: ["Priorização impiedosa: foque no que move o ponteiro hoje.", "Ciclos curtos de entrega e feedback."], blindspot: "Estamos sendo 'resilientes' ou apenas aceitando condições de trabalho insustentáveis?", related: "Liderança e Influência Social"}, {id: 'aprendizado', icon: '', name: 'Curiosidade e Aprendizado Contínuo', concept: "O estado mental de 'Lifelong Learning': a busca voluntária, proativa e constante por novos conhecimentos e habilidades.", perfBR: 30, perfUS: 35, metaphor: "É como manter o software do seu cérebro atualizado. Se você parar de baixar as atualizações, uma hora o sistema trava e você não consegue mais rodar os 'aplicativos' modernos do mercado.", joke: "Quem diz que 'já aprendeu tudo o que precisava' está apenas anunciando a data da sua própria obsolescência programada.", explanation: "A meia-vida de uma habilidade técnica hoje é de 5 anos. Se você não aprende a aprender, você morre profissionalmente. Líderes devem ser 'Chief Learning Officers' de seus times.", pareto: ["Micro-learning: 15 minutos por dia de estudo focado.", "Ensinar o que aprendeu (a melhor forma de fixar)."], blindspot: "Como criar tempo para o aprendizado se a operação 'suga' cada minuto produtivo da equipe?", related: "Pensamento Criativo"}, {id: 'lideranca', icon: '', name: 'Liderança e Influência Social', concept: "Capacidade de guiar pessoas, inspirar confiança e mobilizar grupos em direção a objetivos comuns, mesmo sem autoridade formal.", perfBR: 30, perfUS: 32, metaphor: "O líder de 2030 não é um jogador de xadrez que move peças; é um jardineiro que prepara o terreno para que cada planta cresça no seu máximo potencial.", joke: "Se você precisa lembrar às pessoas que você é o chefe, você pode até ter o cargo, mas certamente não tem a liderança.", explanation: "A liderança migrou do 'comando e controle' para 'conexão e contexto'. Influência social é sobre reputação e entrega de valor para o coletivo.", pareto: ["Escuta ativa: ouvir o que não foi dito.", "Segurança psicológica para o time se expressar."], blindspot: "Sua liderança é baseada na admiração ou no medo das consequências?", related: "Gestão de Talentos"}, {id: 'talentos', icon: '', name: 'Gestão de Talentos', concept: "Habilidade de identificar potenciais, desenvolver competências individuais e orquestrar as habilidades do time para maximizar o desempenho coletivo.", perfBR: 20, perfUS: 38, metaphor: "É como ser um técnico de um time de elite. Você não quer 11 atacantes; você quer o melhor goleiro, o melhor zagueiro e saber como fazê-los jogar juntos.", joke: "Gestão de talentos não é contratar todo mundo que tem um currículo bonito, é não deixar os talentos que você já tem irem embora por causa de uma gestão ruim.", explanation: "Reter talentos é mais barato que contratar. Nos EUA, o foco é em 'upskilling'. No Brasil, o desafio é manter o engajamento em cenários de alta rotatividade.", pareto: ["Feedbacks frequentes e honestos (não anuais).", "Planos de desenvolvimento individuais (PDI)."], blindspot: "Estamos desenvolvendo as pessoas para o que a empresa precisa ou para o que elas têm potencial de ser?", related: "Liderança e Influência Social"}, {id: 'analitico', icon: '', name: 'Pensamento Analítico', concept: "Processo mental de decompor problemas complexos em partes menores, examinar dados e usar a lógica para chegar a conclusões fundamentadas.", perfBR: 18, perfUS: 30, metaphor: "É como ser um detetive. Você não olha para a cena do crime (o problema) e chuta o culpado. Você coleta as evidências, analisa os fatos e deixa a lógica apontar o caminho.", joke: "Sem dados, você é apenas mais uma pessoa com uma opinião. E opiniões, como diria o ditado, todo mundo tem uma.", explanation: "O pensamento analítico é o freio para a impulsividade. É a base para a gestão baseada em evidências. Essencial para otimização de custos e processos.", pareto: ["Método dos 5 Porquês para chegar na causa raiz.", "Diferenciar fato de suposição."], blindspot: "Análise demais gera paralisia. Quando é hora de parar de analisar e começar a agir?", related: "IA e Big Data"}, {id: 'ambiental', icon: '', name: 'Gestão Ambiental', concept: "Capacidade de integrar práticas sustentáveis e consciência ecológica nas operações de negócio, visando o impacto positivo a longo prazo no planeta.", perfBR: 22, perfUS: 18, metaphor: "É como cuidar do seu próprio jardim. Você pode colher tudo o que puder hoje e deixar a terra seca, ou pode cultivar de forma que o jardim dê frutos para sempre.", joke: "Sustentabilidade não é só imprimir menos papel; é garantir que sua empresa ainda tenha um mercado (e um planeta) para existir daqui a 20 anos.", explanation: "Estreia na lista do WEF. O consumidor e o investidor de 2030 punem empresas que ignoram o ESG. No Brasil, temos uma oportunidade gigante de liderar esse pilar.", pareto: ["Eficiência de recursos (menos é mais).", "Transparência na cadeia de suprimentos."], blindspot: "Sua gestão ambiental é real ou é apenas 'Greenwashing' para o relatório anual?", related: "Resiliência, Flexibilidade e Agilidade" {]; // --- CORE LOGIC --- let currentChart = null; function init() {renderSidebar(); loadOverview(); {function renderSidebar() {const nav = document.getElementById('skill-nav'); skillsData.forEach(skill => {const btn = document.createElement('button'); btn.className = 'w-full text-left px-4 py-2 rounded-lg text-sm text-stone-400 hover:bg-stone-800 hover:text-white transition-colors flex items-center gap-3 group'; btn.innerHTML = `<span class="text-lg group-hover:scale-110 transition-transform">$\skill.icon\</span> <span class="truncate">$\skill.name\</span>`; btn.onclick = () => loadSkill(skill.id); nav.appendChild(btn);}); {function setActiveButton(id) {document.querySelectorAll('aside button').forEach(b => {b.classList.remove('bg-blue-600', 'text-white', 'bg-stone-800'); if(b.id === 'btn-overview') b.classList.add('text-stone-300'); else b.classList.add('text-stone-400');}); if(id === 'overview') {document.getElementById('btn-overview').classList.add('bg-blue-600', 'text-white'); document.getElementById('btn-overview').classList.remove('text-stone-300'); {else {const btns = document.querySelectorAll('#skill-nav button'); btns.forEach(b => {if(b.onclick.toString().includes(`'$\id\'`)) {b.classList.add('bg-stone-800', 'text-white'); b.classList.remove('text-stone-400'); {\); {{function loadOverview() {setActiveButton('overview'); const content = document.getElementById('main-content'); content.innerHTML = `
